[tasks.install]
description = "Install Cilium Gateway API CRDs"
run = """
kubectl apply --server-side -f https://github.com/kubernetes-sigs/gateway-api/releases/latest/download/experimental-install.yaml
cilium install --version 1.19.3 \
  --set kubeProxyReplacement=true \
  --set k8sServiceHost={{ env.NODE_1_IP_ETH }} \
  --set k8sServicePort=6443 \
  --set ipam.mode=kubernetes \
  --set k8s.requireIPv4PodCIDR=true \
  --set routingMode=tunnel \
  --set tunnelProtocol=vxlan \
  --set devices='{eth0,wlan0}' \
  --set bpf.masquerade=true \
  --set ipv4NativeRoutingCIDR={{ env.CLUSTER_CIDR }} \
  --set autoDirectNodeRoutes=false \
  --set operator.replicas=1 \
  --set cni.exclusive=true \
  --set gatewayAPI.enabled=true \
  --set l2announcements.enabled=true \
  --set k8sClientRateLimit.qps=50 \
  --set k8sClientRateLimit.burst=100 \
  --set hubble.enabled=true \
  --set hubble.relay.enabled=true \
  --set hubble.ui.enabled=true \
  --set MTU=1450
cilium status --wait
"""

[tasks.test]
description = "Test Cilium connectivity"
run = """
cilium connectivity test --test-concurrency 5
kubectl delete namespace cilium-test-1 cilium-test-ccnp1 cilium-test-ccnp2
"""

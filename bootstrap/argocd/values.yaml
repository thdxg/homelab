controller:
  replicas: 1
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

server:
  replicas: 1
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

repoServer:
  replicas: 1
  requests:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  env:
    - name: SOPS_AGE_KEY_FILE
      value: /home/argocd/keys/key.txt
  volumes:
    - name: sops-age-key
      secret:
        secretName: sops-age-key
  volumeMounts:
    - name: sops-age-key
      mountPath: /home/argocd/keys
      readOnly: true

applicationSet:
  replicas: 1
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

redis:
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"

configs:
  params:
    "server.disable.auth": "true"
    "server.insecure": "true"
    "controller.diff.server.side": "true"
  cm:
    "application.resourceTrackingMethod": "annotation"
    "timeout.reconciliation": "60s"

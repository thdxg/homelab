apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudflared
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  sources:
    - repoURL: https://charts.moonswitch.com
      chart: cloudflare-tunnel-remote
      targetRevision: 0.1.4
      helm:
        valueFiles:
          - $homelab/apps/cloudflared/values.yaml
    - repoURL: https://github.com/thdxg/homelab.git
      targetRevision: main
      ref: homelab
    - repoURL: https://github.com/thdxg/homelab.git
      targetRevision: main
      path: apps/cloudflared/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: cloudflared
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
